<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 272 56" fill="none">
  <!--
    Pixel-art [sudo] logo
    Each pixel block = 8x8 units
    Grid: 34 cols × 7 rows
  -->
  <g fill="currentColor">
    <!-- [ left bracket -->
    <rect x="0"  y="0"  width="8"  height="56"/>
    <rect x="8"  y="0"  width="16" height="8"/>
    <rect x="8"  y="48" width="16" height="8"/>

    <!-- S -->
    <rect x="40" y="0"  width="32" height="8"/>
    <rect x="40" y="8"  width="8"  height="16"/>
    <rect x="40" y="24" width="32" height="8"/>
    <rect x="64" y="32" width="8"  height="16"/>
    <rect x="40" y="48" width="32" height="8"/>

    <!-- U -->
    <rect x="88" y="0"  width="8"  height="48"/>
    <rect x="88" y="48" width="32" height="8"/>
    <rect x="112" y="0" width="8"  height="48"/>

    <!-- D -->
    <rect x="136" y="0" width="8"  height="56"/>
    <rect x="144" y="0" width="16" height="8"/>
    <rect x="160" y="8" width="8"  height="40"/>
    <rect x="144" y="48" width="16" height="8"/>

    <!-- O -->
    <rect x="184" y="0"  width="32" height="8"/>
    <rect x="184" y="8"  width="8"  height="40"/>
    <rect x="208" y="8"  width="8"  height="40"/>
    <rect x="184" y="48" width="32" height="8"/>

    <!-- ] right bracket -->
    <rect x="232" y="0"  width="16" height="8"/>
    <rect x="232" y="48" width="16" height="8"/>
    <rect x="240" y="0"  width="8"  height="56"/>
  </g>
</svg>
